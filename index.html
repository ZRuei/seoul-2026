<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes">
<meta name="theme-color" content="#FAFAFA">
<title>SHINee 首爾行 2026</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FAFAFA'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='40' fill='%231A1A1A' font-family='Inter,sans-serif' font-weight='900'%3ES%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap">
<style>
:root {
  --bg:           #FAFAFA;
  --surface:      #FFFFFF;
  --ink:          #1A1A1A;
  --ink-mute:     #71717A;
  --line:         #E4E4E7;
  --accent:       #79E5CB;
  --accent-mute:  #F0FBF7;
  --warn:         #F59E0B;
  --done:         #A1A1AA;
  --danger:       #DC2626;
  --tap: 44px;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-6:  24px;
  --space-8:  32px;
  --space-12: 48px;
  --space-16: 64px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Inter", "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased;
}

header.app-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: env(safe-area-inset-top) 16px 0 16px;
}
.title-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 10px;
}
.title {
  font-family: "Inter", sans-serif;
  font-size: 13px; font-weight: 900;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink);
}
.title .brand-shinee { text-transform: none; letter-spacing: 0.02em; }
.title .sync-pill {
  font-size: 10px; font-weight: 700;
  margin-left: 10px; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--ink-mute);
  vertical-align: 1px;
  background: transparent; padding: 0; border-radius: 0;
  transition: color 200ms ease;
}
.sync-pill.ok { color: var(--ink); }
.sync-pill.warn { color: var(--warn); }
.sync-pill.err { color: var(--danger); }
.icon-btn {
  width: 36px; height: 36px;
  border: none; background: transparent; cursor: pointer;
  color: var(--ink-mute);
  display: inline-flex; align-items: center; justify-content: center;
  transition: color 300ms ease;
}
.icon-btn:hover { color: var(--accent); }
.icon-btn:active { color: var(--accent); }

nav.day-tabs {
  display: flex; gap: 2px; overflow-x: auto;
  padding: 0 0 0 0; margin-bottom: 0;
  border-top: 1px solid var(--line);
  scrollbar-width: none;
  position: relative;
}
nav.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex: 0 0 auto;
  border: none; background: transparent;
  padding: 12px 14px 14px;
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--ink-mute); cursor: pointer;
  white-space: nowrap;
  transition: color 300ms ease;
  position: relative;
  text-align: center;
  line-height: 1.2;
}
.day-tab:hover { color: var(--ink); }
.day-tab .dnum {
  display: block; font-size: 15px; font-weight: 900;
  letter-spacing: -0.01em; color: inherit;
  margin-bottom: 2px;
}
.day-tab.active { color: var(--ink); }
.day-tab.active::after {
  content: ""; position: absolute;
  left: 12px; right: 12px; bottom: 0; height: 2px;
  background: var(--accent);
  transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
}

main { padding: 16px 12px 24px; max-width: 720px; margin: 0 auto; }

.day-header {
  display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  margin: 24px 0 12px;
}
.day-header h1 {
  font-family: "Inter", sans-serif;
  font-size: 32px; font-weight: 900;
  letter-spacing: -0.02em; margin: 0;
}
.day-header .subtitle {
  font-size: 13px; color: var(--ink-mute);
  font-weight: 300;
}
.day-summary {
  font-size: 13px; color: var(--ink);
  background: transparent;
  border: none; border-left: 2px solid var(--line);
  padding: 0 0 0 14px; margin-bottom: 24px;
  line-height: 1.6; font-weight: 300;
}

.cards { display: block; }

.card {
  background: transparent;
  border: none;
  border-top: 1px solid var(--line);
  padding: 18px 0;
  position: relative;
  transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
}
.cards .card:last-child { border-bottom: 1px solid var(--line); }
.card.dragging { opacity: 0.4; }
.card.ghost {
  background: var(--accent-mute);
  border-top: 1px dashed var(--accent);
}
.card.hidden-item { display: none; }
.show-hidden .card.hidden-item {
  display: block; opacity: 0.4; border-style: dashed;
}

/* tier system */
.card[data-tier="anchor"] {
  border-left: 4px solid var(--accent);
  padding-left: 14px;
  padding-right: 14px;
}
.card[data-tier="anchor"] .card-name { font-weight: 900; }
.card[data-tier="anchor"] .card-tag {
  border-color: var(--accent); color: var(--ink);
}
.card[data-tier="optional"] {
  opacity: 0.55;
  transition: opacity 300ms ease;
}
.card[data-tier="optional"]:hover { opacity: 1; }
.card[data-tier="optional"] .card-name {
  font-weight: 300; color: var(--ink-mute);
}

/* done state */
.card[data-done="true"] .card-name {
  text-decoration: line-through;
  text-decoration-thickness: 1px;
  text-decoration-color: var(--ink-mute);
  color: var(--ink-mute);
}
.card[data-done="true"] .card-time { color: var(--ink-mute); }
.card[data-done="true"] .card-tag { display: none; }
.card[data-done="true"] .card-actions { opacity: 0.5; }

/* row layout */
.card-row {
  display: flex; align-items: baseline; gap: 12px;
}
.card-time {
  font-family: "Inter", monospace;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  font-size: 14px; color: var(--ink);
  min-width: 50px; flex-shrink: 0;
}
.card-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 2px 7px; border: 1px solid var(--line);
  text-transform: uppercase; color: var(--ink-mute);
  white-space: nowrap; flex-shrink: 0;
  transition: border-color 300ms ease, color 300ms ease;
}
.card-tag:hover { border-color: var(--accent); color: var(--ink); }
.card-name {
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 15px; font-weight: 700; margin: 0;
  letter-spacing: -0.005em; flex: 1; color: var(--ink);
  line-height: 1.4;
}
.card-menu-btn {
  margin-left: auto; padding: 4px; background: transparent;
  border: none; color: var(--ink-mute); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: color 300ms ease;
}
.card-menu-btn:hover { color: var(--accent); }

/* meta + actions */
.card-meta {
  font-size: 13px; color: var(--ink-mute);
  font-weight: 300; margin-top: 6px;
  padding-left: 62px; line-height: 1.5;
}
.card-meta .tx-icon { display: none; }
.card-actions {
  margin-top: 12px; padding-left: 62px;
  display: flex; gap: 18px; flex-wrap: wrap;
}
.link-naver, .link-note {
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
  color: var(--ink);
  border: none; background: transparent; padding: 0;
  cursor: pointer; text-decoration: none;
  transition: color 300ms ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.link-naver:hover, .link-note:hover { color: var(--accent); }
.link-naver .icon, .link-note .icon { width: 14px; height: 14px; }

/* drag handle: hover-only */
.drag-handle {
  position: absolute; left: -22px; top: 18px;
  color: var(--ink-mute);
  cursor: grab; touch-action: none;
  opacity: 0; transition: opacity 200ms ease;
  padding: 4px;
}
.card:hover .drag-handle { opacity: 0.6; }
.card .drag-handle:active { cursor: grabbing; opacity: 1; }

/* checkbox */
.card-checkbox {
  width: 20px; height: 20px;
  border: 1.5px solid var(--ink-mute);
  border-radius: 0;
  background: transparent; cursor: pointer; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 180ms ease;
  color: transparent;
}
.card-checkbox.checked {
  background: var(--ink); border-color: var(--ink);
  color: white; transform: scale(1);
}
.card-checkbox.bounce { animation: cb-bounce 180ms ease; }
@keyframes cb-bounce {
  0% { transform: scale(0.6); }
  100% { transform: scale(1); }
}

/* note */
.card-note {
  margin-top: 10px; padding: 10px 12px;
  background: transparent;
  border-left: 2px solid var(--warn);
  font-size: 13px; color: var(--ink);
  font-weight: 300; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
  margin-left: 62px;
}
.card-note:empty { display: none; }

/* add btn */
.add-btn {
  margin: 24px 0 0; display: block; width: 100%;
  padding: 14px; background: transparent;
  border: none; border-top: 1px solid var(--line);
  color: var(--ink-mute);
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer; transition: color 300ms ease;
}
.add-btn:hover { color: var(--accent); }

/* Modal */
body.modal-open { overflow: hidden; }
body.modal-open .bottom-nav { display: none; }

.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 1100; padding: 0;
  opacity: 0; transition: opacity 250ms ease;
}
.modal-backdrop.show {
  display: flex; opacity: 1;
}
.modal {
  background: var(--surface); width: 100%; max-width: 600px;
  border-radius: 16px 16px 0 0;
  padding: 20px;
  max-height: 85vh; overflow-y: auto;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-backdrop.show .modal { transform: translateY(0); }

.modal h2 {
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.02em;
  margin: 4px 0 18px;
  display: flex; justify-content: space-between; align-items: center;
  color: var(--ink);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.modal h2 .close {
  background: transparent; border: none;
  color: var(--ink-mute); cursor: pointer;
  padding: 4px; transition: color 300ms ease;
}
.modal h2 .close:hover { color: var(--accent); }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 12px; color: var(--ink-mute);
  letter-spacing: 0.02em;
  margin-bottom: 6px; font-weight: 700;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 0;
  border: none; border-bottom: 1px solid var(--line);
  border-radius: 0;
  font-size: 14px; font-family: inherit;
  background: transparent; color: var(--ink);
  transition: border-color 300ms ease;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-bottom-color: var(--accent);
}
.field textarea { min-height: 80px; resize: vertical; }
.field .hint {
  font-size: 11px; color: var(--ink-mute);
  margin-top: 6px; font-weight: 300;
}
.btn-row { display: flex; gap: 8px; margin-top: 20px; }
.btn-row button {
  flex: 1; padding: 12px;
  border-radius: 0; border: 1px solid var(--line);
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer; background: transparent;
  color: var(--ink);
  transition: all 300ms ease;
}
.btn-row button:hover {
  border-color: var(--accent); color: var(--accent);
}
.btn-row button.primary {
  background: var(--ink); color: white; border-color: var(--ink);
}
.btn-row button.primary:hover {
  background: var(--accent); border-color: var(--accent); color: var(--ink);
}
.btn-row button.danger {
  color: var(--danger); border-color: var(--line);
}
.btn-row button.danger:hover {
  border-color: var(--danger); color: var(--danger);
}

.menu-list { list-style: none; padding: 0; margin: 0; }
.menu-list li {
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; gap: 14px;
  color: var(--ink);
  transition: color 300ms ease;
}
.menu-list li:hover { color: var(--accent); }
.menu-list li:last-child { border-bottom: none; }
.menu-list li.danger { color: var(--danger); }
.menu-list li.danger:hover { color: var(--danger); opacity: 0.7; }
.menu-list li .icon {
  width: 20px; height: 20px; text-align: center;
  color: var(--ink-mute);
}

.settings-section {
  margin-bottom: 24px; padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
}
.settings-section:last-child { border-bottom: none; }
.settings-section h3 {
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 12px; color: var(--ink-mute);
  margin: 0 0 12px;
  letter-spacing: 0.02em;
  font-weight: 700;
}
.kv {
  display: flex; justify-content: space-between;
  padding: 8px 0; font-size: 13px;
  border-bottom: 1px solid var(--line);
}
.kv:last-child { border-bottom: none; }
.kv .k { color: var(--ink-mute); font-weight: 300; }
.kv .v { font-weight: 700; word-break: break-all; color: var(--ink); }

/* search */
.search-box {
  padding: 0 0 12px;
  display: none;
}
.search-box.show { display: block; }
.search-box input {
  width: 100%; padding: 8px 0;
  border: none; border-bottom: 1px solid var(--line);
  border-radius: 0;
  font-size: 14px; font-family: inherit; background: transparent;
  color: var(--ink);
  transition: border-color 300ms ease;
}
.search-box input:focus {
  outline: none; border-bottom-color: var(--accent);
}
.search-hit-mark {
  background: var(--accent-mute); padding: 0 2px;
  border-radius: 0; color: var(--ink);
}

.toast {
  position: fixed; left: 50%; transform: translateX(-50%);
  bottom: calc(80px + env(safe-area-inset-bottom));
  background: var(--ink); color: white;
  padding: 10px 20px; border-radius: 0;
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 13px; font-weight: 500;
  letter-spacing: 0.02em;
  opacity: 0; transition: opacity 200ms ease;
  z-index: 1200; pointer-events: none; max-width: 90%;
}
.toast.show { opacity: 1; }

@media (max-width: 380px) {
  .day-tab { padding: 6px 10px; font-size: 12px; }
  .day-tab .dnum { font-size: 15px; }
  .card { padding: 14px 0; }
}

/* ----- Bottom Nav ----- */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--line);
  display: flex; z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav button {
  flex: 1; background: transparent; border: none;
  padding: 12px 4px 10px;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  color: var(--ink-mute); cursor: pointer;
  font-family: "Inter", sans-serif;
  min-height: 56px; position: relative;
  transition: color 300ms ease;
}
.bottom-nav button:hover { color: var(--ink); }
.bottom-nav button.active { color: var(--ink); }
.bottom-nav button.active::before {
  content: ""; position: absolute;
  top: 0; left: 28%; right: 28%; height: 2px;
  background: var(--accent);
}
.bottom-nav button .nlabel {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.02em;
}

/* hide day tabs on non-itinerary views */
body[data-view="packing"] nav.day-tabs,
body[data-view="map"] nav.day-tabs { display: none; }

.view { display: none; }
.view.active { display: block; }

/* ----- Weather Card ----- */
.weather-card {
  background: transparent;
  border: none;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 18px 0;
  margin-bottom: 24px;
  cursor: pointer;
  transition: background 200ms ease;
}
.weather-card:hover { background: var(--accent-mute); }
.weather-card.loading { opacity: 0.55; cursor: progress; }
.weather-card.error .w-temp { color: var(--warn); }
.weather-card .w-main {
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
}
.weather-card .w-icon { color: var(--ink); flex-shrink: 0; align-self: center; }
.weather-card .w-temp {
  font-family: "Inter", sans-serif;
  font-size: 24px; font-weight: 900; color: var(--ink);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.weather-card .w-text { font-size: 13px; color: var(--ink); font-weight: 400; }
.weather-card .w-pop { font-size: 12px; color: var(--ink-mute); font-weight: 300; }
.weather-card .w-warn-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
  padding: 2px 8px; border: 1px solid var(--warn);
  color: var(--warn);
}
.weather-card .w-meta {
  margin-top: 10px; display: flex; gap: 16px; align-items: center;
  font-size: 10px; color: var(--ink-mute);
  font-family: "Inter", sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.weather-card .w-meta a {
  color: var(--ink); text-decoration: none; font-weight: 700;
  transition: color 300ms ease;
}
.weather-card .w-meta a:hover { color: var(--accent); }
.weather-card .w-updated { margin-left: auto; font-weight: 300; text-transform: none; letter-spacing: 0; }
.weather-card .w-source {
  margin-top: 6px; font-size: 10px;
  color: var(--ink-mute); font-weight: 300;
}
.weather-card .w-source.warn { color: var(--warn); }

/* ----- Packing View ----- */
.packing-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: 24px 0 24px;
}
.packing-header h1 {
  font-family: "Inter", sans-serif;
  font-size: 28px; font-weight: 900;
  letter-spacing: -0.02em; margin: 0;
}
.packing-header .progress {
  font-size: 12px; color: var(--ink-mute);
  font-family: "Inter", sans-serif;
  font-weight: 300; letter-spacing: 0.05em;
  background: transparent; padding: 0; border: none;
}
.pack-cat {
  background: transparent;
  border: none; border-radius: 0;
  margin-bottom: 32px;
  overflow: visible;
}
.pack-cat-head {
  padding: 0 0 12px 0;
  font-family: "Inter", "Noto Sans TC", sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--ink);
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--line);
}
.pack-cat-head .pct-progress {
  font-size: 11px; color: var(--ink-mute);
  font-weight: 300; padding: 0;
  background: transparent; border-radius: 0;
  letter-spacing: 0;
}
.pack-cat-head .pct-progress.done { color: var(--accent); }
.pack-cat-head .chev {
  color: var(--ink-mute); margin-left: 12px;
  transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
}
.pack-cat.collapsed .chev { transform: rotate(-90deg); }
.pack-cat.collapsed .pack-items,
.pack-cat.collapsed .pack-add { display: none; }
.pack-items { padding: 0; list-style: none; margin: 0; }
.pack-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 14px;
  transition: opacity 300ms ease;
}
.pack-item.done .pack-name {
  text-decoration: line-through;
  text-decoration-thickness: 1px;
  color: var(--ink-mute);
}
.pack-cb {
  width: 18px; height: 18px;
  border: 1.5px solid var(--ink-mute);
  border-radius: 0;
  background: transparent; cursor: pointer; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  color: transparent;
  transition: all 180ms ease;
}
.pack-cb.checked {
  background: var(--ink); border-color: var(--ink); color: white;
}
.pack-name {
  flex: 1; font-size: 14px; color: var(--ink);
  font-weight: 400;
}
.pack-note {
  font-size: 12px; color: var(--ink-mute);
  font-weight: 300; margin-left: 4px;
}
.pack-delete {
  background: transparent; border: none;
  color: var(--ink-mute); cursor: pointer;
  padding: 4px; transition: color 300ms ease;
}
.pack-delete:hover { color: var(--danger); }
.pack-add {
  padding: 14px 0;
  display: flex; gap: 8px;
  border-bottom: 1px solid var(--line);
  background: transparent;
}
.pack-add input {
  flex: 1; padding: 6px 0;
  border: none; border-bottom: 1px solid var(--line);
  border-radius: 0; background: transparent;
  font-size: 14px; font-family: inherit; color: var(--ink);
  transition: border-color 300ms ease;
}
.pack-add input:focus {
  outline: none; border-bottom-color: var(--accent);
}
.pack-add input::placeholder {
  color: var(--ink-mute); font-weight: 300;
}
.pack-add button {
  padding: 0 12px; background: transparent;
  color: var(--ink); border: 1px solid var(--line);
  border-radius: 0; font-size: 13px; font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer; font-family: "Inter", "Noto Sans TC", sans-serif;
  transition: all 300ms ease;
}
.pack-add button:hover {
  border-color: var(--accent); color: var(--accent);
}

/* ----- Map View ----- */
.map-controls {
  background: transparent;
  border: none; border-bottom: 1px solid var(--line);
  padding: 12px 0;
  margin-bottom: 12px;
  display: flex; gap: 4px; overflow-x: auto;
  scrollbar-width: none;
}
.map-controls::-webkit-scrollbar { display: none; }
.map-day-chip {
  flex: 0 0 auto;
  padding: 8px 12px;
  border: none; border-radius: 0;
  background: transparent;
  color: var(--ink-mute);
  font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
  cursor: pointer; white-space: nowrap;
  font-family: "Inter", "Noto Sans TC", sans-serif;
  position: relative;
  transition: color 300ms ease;
}
.map-day-chip:hover { color: var(--ink); }
.map-day-chip.active { color: var(--ink); }
.map-day-chip.active::after {
  content: ""; position: absolute;
  left: 12px; right: 12px; bottom: 0; height: 2px;
  background: var(--accent);
}
.map-day-chip.all.active::after { background: var(--accent); }

#leaflet-map {
  height: calc(100vh - 300px); min-height: 260px;
  border: 1px solid var(--line);
  border-radius: 0; overflow: hidden;
  position: relative; z-index: 0;
}
.leaflet-popup-content { font-family: inherit; font-size: 13px; }
.leaflet-popup-content b { display: block; margin-bottom: 4px; font-weight: 700; }
.leaflet-popup-content .pop-time {
  color: var(--ink); font-weight: 700;
  margin-right: 6px; font-family: "Inter", monospace;
}
.leaflet-popup-content .pop-day {
  font-size: 11px; color: var(--ink-mute);
  font-weight: 300;
}
.leaflet-popup-content a {
  color: var(--ink); font-weight: 700;
  letter-spacing: 0.02em;
  font-size: 12px; text-decoration: none;
  transition: color 300ms ease;
}
.leaflet-popup-content a:hover { color: var(--accent); }
.leaflet-popup-content-wrapper { border-radius: 0; }
.map-legend {
  display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px;
  padding: 12px 0; background: transparent;
  border-top: 1px solid var(--line);
  font-size: 11px; color: var(--ink-mute);
  font-family: "Inter", "Noto Sans TC", sans-serif;
  letter-spacing: 0.02em;
}
.map-legend .dot {

function loadLocal() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return structuredClone(DEFAULT_DATA);
  try {
    const parsed = JSON.parse(raw);
    return mergeWithDefaults(parsed);
  } catch (e) {
    console.error("Failed to parse local data, using defaults", e);
    return structuredClone(DEFAULT_DATA);
  }
}

// Merge user data with DEFAULT_DATA so new fields appear without losing user notes/order
function mergeWithDefaults(user) {
  const merged = structuredClone(DEFAULT_DATA);
  if (!user.items) return merged;
  // Preserve user's per-item state (done, hidden, note, order) and added items
  for (const dayId of Object.keys(DEFAULT_DATA.items)) {
    const userItems = user.items[dayId] || [];
    const defaultItems = DEFAULT_DATA.items[dayId];
    const userById = Object.fromEntries(userItems.map(i => [i.id, i]));
    // Use user's order if exists, otherwise default order
    const userIds = userItems.map(i => i.id);
    const defaultIds = defaultItems.map(i => i.id);
    const orderedIds = userIds.length ? userIds : defaultIds;
    // Add any new default items not yet in user list, append
    for (const did of defaultIds) {
      if (!orderedIds.includes(did)) orderedIds.push(did);
    }
    merged.items[dayId] = orderedIds.map(id => {
      const def = defaultItems.find(i => i.id === id);
      const usr = userById[id];
      if (!def && !usr) return null;
      if (!def) {
        // user-added custom item
        return { ...usr, _custom: true };
      }
      return {
        ...def,
        done: usr?.done || false,
        hidden: usr?.hidden || false,
        note: usr?.note ?? "",
        time: usr?.time ?? def.time,
        name: usr?.name ?? def.name
      };
    }).filter(Boolean);
  }
  // Merge packing list
  if (user.packing) {
    const userCatById = Object.fromEntries(user.packing.map(c => [c.id, c]));
    merged.packing = merged.packing.map(defCat => {
      const usrCat = userCatById[defCat.id];
      if (!usrCat) return defCat;
      const usrItemById = Object.fromEntries((usrCat.items || []).map(i => [i.id, i]));
      const defItemIds = defCat.items.map(i => i.id);
      const usrItemIds = (usrCat.items || []).map(i => i.id);
      // 一旦使用者動過這個分類，以使用者清單為準（刪除才能持久，不自動補回預設項目）
      const orderedIds = usrItemIds.length ? usrItemIds : defItemIds;
      return {
        ...defCat,
        items: orderedIds.map(id => {
          const def = defCat.items.find(i => i.id === id);
          const usr = usrItemById[id];
          if (!def && !usr) return null;
          if (!def) return { ...usr, _custom: true };
          return {
            ...def,
            done: usr?.done || false,
            name: usr?.name ?? def.name,
            note: usr?.note ?? def.note ?? ""
          };
        }).filter(Boolean)
      };
    });
    // Append user-added custom categories
    for (const usrCat of user.packing) {
      if (!merged.packing.find(c => c.id === usrCat.id)) {
        merged.packing.push({ ...usrCat, _custom: true });
      }
    }
  }
  return merged;
}

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  scheduleSync();
}

function scheduleSync() {
  if (!getToken() || !getGistId()) return;
  pendingSync = true;
  setSyncStatus("PENDING", "warn");
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncToGist(), 1500);
}

/* ==================== GIST SYNC ==================== */
function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
function getGistId() { return localStorage.getItem(GIST_KEY) || ""; }

async function syncToGist() {
  const token = getToken();
  const gistId = getGistId();
  if (!token || !gistId) return;
  setSyncStatus("SYNCING", "warn");
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: "PATCH",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "seoul-2026.json": { content: JSON.stringify(state, null, 2) }
        }
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    pendingSync = false;
    setSyncStatus("SYNCED", "ok");
  } catch (e) {
    console.error(e);
    setSyncStatus("SYNC FAILED", "err");
  }
}

async function pullFromGist() {
  const token = getToken();
  const gistId = getGistId();
  if (!token || !gistId) {
    toast("尚未設定 Token / Gist ID");
    return;
  }
  setSyncStatus("PULLING", "warn");
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github+json"
      }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const file = data.files["seoul-2026.json"];
    if (!file) throw new Error("Gist 沒有 seoul-2026.json");
    const content = file.truncated ? await (await fetch(file.raw_url)).text() : file.content;
    const parsed = JSON.parse(content);
    state = mergeWithDefaults(parsed);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    setSyncStatus("SYNCED", "ok");
    render();
    toast("已拉取雲端最新版");
  } catch (e) {
    console.error(e);
    setSyncStatus("PULL FAILED", "err");
    toast("拉取失敗：" + e.message);
  }
}

async function createGist() {
  const token = getToken();
  if (!token) {
    toast("請先輸入 Token");
    return;
  }
  setSyncStatus("CREATING", "warn");
  try {
    const res = await fetch("https://api.github.com/gists", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        description: "SHINee 首爾 2026 行程資料",
        public: false,
        files: {
          "seoul-2026.json": { content: JSON.stringify(state, null, 2) }
        }
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    localStorage.setItem(GIST_KEY, data.id);
    setSyncStatus("SYNCED", "ok");
    toast("Gist created: " + data.id);
    openSettings();
  } catch (e) {
    console.error(e);
    setSyncStatus("CREATE FAILED", "err");
    toast("建立失敗：" + e.message);
  }
}

function renderDayTabs() {
  const nav = document.getElementById("day-tabs");
  nav.innerHTML = "";
  state.days.forEach(day => {
    const btn = document.createElement("button");
    btn.className = "day-tab" + (day.id === currentDayId ? " active" : "");
    btn.innerHTML = `<span class="dnum">${day.date}</span>${day.weekday.replace("週", "")}`;

      setTimeout(() => btn.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" }), 50);

function computeTier(item) {
  if (item.fixed || (item.highlight && /錨點/.test(item.highlight))) return "anchor";
  if (item.optional || /如尚|視體力|視當天|\(可選\)|備案|可選/.test(item.name || "")) return "optional";
  return "default";
}

function tierTag(tier) {
  if (tier === "anchor") return "ANCHOR";
  if (tier === "optional") return "OPTIONAL";
  return null;
}

// 若 search 是完整網址（含 naver.me 分享連結）就直接當連結；否則組成 Naver 搜尋連結
function naverLink(search) {
  if (!search) return null;
  const s = search.trim();
  if (/^https?:\/\//i.test(s)) return s;
  return `https://map.naver.com/p/search/${encodeURIComponent(s)}`;
}

function renderCard(item) {
  const tier = computeTier(item);
  const div = document.createElement("div");
  div.className = "card" + (item.hidden ? " hidden-item" : "");
  div.dataset.id = item.id;
  div.dataset.tier = tier;
  div.dataset.done = item.done ? "true" : "false";

  const naverUrl = naverLink(item.search);
  const noteText = item.note || item.note_default || "";
  const tag = tierTag(tier) || (item.highlight && !["錨點"].includes(item.highlight) ? item.highlight : null);

  div.innerHTML = `
    <span class="drag-handle" title="拖曳排序"><svg class="icon icon-sm"><use href="#i-grip-vertical"/></svg></span>
    <div class="card-row">
      <span class="card-time">${escapeHtml(item.time || "")}</span>
      ${tag ? `<span class="card-tag">${escapeHtml(tag)}</span>` : ""}
      <h3 class="card-name">${highlightSearch(item.name)}</h3>
      <button class="card-menu-btn" aria-label="選單"><svg class="icon icon-sm"><use href="#i-more-horizontal"/></svg></button>
    </div>
    ${item.transport ? `<div class="card-meta">${highlightSearch(item.transport)}</div>` : ""}
    ${noteText ? `<div class="card-note">${escapeHtml(noteText)}</div>` : ""}
    <div class="card-actions">
      ${naverUrl ? `<a class="link-naver" href="${naverUrl}" target="_blank" rel="noopener"><svg class="icon"><use href="#i-map-pin"/></svg>Naver 地圖</a>` : ""}
      <button class="link-note"><svg class="icon"><use href="#i-pencil"/></svg>${item.note ? "編輯備註" : "加備註"}</button>
    </div>
  `;
  div.querySelector(".card-menu-btn").onclick = (e) => {
    e.stopPropagation();
    openItemMenu(item);
  };
  div.querySelector('.link-note').onclick = (e) => {
    e.stopPropagation();
    openNoteEdit(item);
  };
  return div;
}

function highlightSearch(text) {
  const safe = escapeHtml(text || "");
  if (!searchTerm) return safe;
  const re = new RegExp(escapeRegex(searchTerm), "gi");
  return safe.replace(re, m => `<mark class="search-hit-mark">${m}</mark>`);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function openItemMenu(item) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modal-content");
  content.innerHTML = `
    <h2>${escapeHtml(item.name)}<button class="close" aria-label="關閉"><svg class="icon icon-md"><use href="#i-x"/></svg></button></h2>
    <ul class="menu-list">
      <li data-act="edit"><svg class="icon icon-sm"><use href="#i-pen-line"/></svg>編輯時間/名稱</li>
      <li data-act="note"><svg class="icon icon-sm"><use href="#i-pencil"/></svg>${item.note ? "編輯備註" : "加備註"}</li>
      <li data-act="toggle-hide"><svg class="icon icon-sm"><use href="#i-${item.hidden ? "eye" : "eye-off"}"/></svg>${item.hidden ? "顯示" : "隱藏（不去）"}</li>

    </ul>
  `;
  content.querySelector(".close").onclick = closeModal;
  content.querySelectorAll("[data-act]").forEach(li => {
    li.onclick = () => {
      const act = li.dataset.act;
      closeModal();
      if (act === "edit") openItemEdit(item);
      else if (act === "note") openNoteEdit(item);
      else if (act === "toggle-hide") {
        item.hidden = !item.hidden;
        saveLocal();
        render();
        toast(item.hidden ? "已隱藏（設定可顯示）" : "已顯示");
      } else if (act === "delete") {
        if (confirm(`確定刪除「${item.name}」？`)) {
          const arr = state.items[currentDayId];
          state.items[currentDayId] = arr.filter(i => i.id !== item.id);
          saveLocal();
          render();
        }
      }
    };
  });
  modal.classList.add("show");
  document.body.classList.add("modal-open");
}

      state.items[currentDayId].push(data);
      // sort by time if filled
      state.items[currentDayId].sort((a, b) => (a.time || "99").localeCompare(b.time || "99"));
    }
    saveLocal();
    closeModal();
    render();
  };
  const delBtn = content.querySelector("#del");
  if (delBtn) {
    delBtn.onclick = () => {
      if (confirm(`確定刪除「${data.name}」？`)) {
        state.items[currentDayId] = state.items[currentDayId].filter(i => i.id !== data.id);
        saveLocal();
        closeModal();
        render();
      }
    };
  }
  modal.classList.add("show");
  document.body.classList.add("modal-open");
  setTimeout(() => content.querySelector("#f-time").focus(), 100);
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
  document.body.classList.remove("modal-open");
}

    <div class="settings-section">
      <h3>雲端同步</h3>
      <div class="field">
        <label>GitHub Personal Access Token（gist scope）</label>

    <div class="settings-section">

      <h3>關於</h3>

  content.querySelector(".close").onclick = closeModal;

    localStorage.setItem(GIST_KEY, content.querySelector("#set-gistid").value.trim());

    setSyncStatus(getToken() && getGistId() ? "READY" : "NOT SET", getToken() && getGistId() ? "ok" : "");
  };
  content.querySelector("#btn-create-gist").onclick = async () => {
    localStorage.setItem(TOKEN_KEY, content.querySelector("#set-token").value.trim());
    await createGist();
  };
  content.querySelector("#btn-pull").onclick = async () => {
    localStorage.setItem(TOKEN_KEY, content.querySelector("#set-token").value.trim());
    localStorage.setItem(GIST_KEY, content.querySelector("#set-gistid").value.trim());

    document.body.classList.toggle("show-hidden", showHidden);

/* ==================== WEATHER ==================== */
async function loadWeather(force) {
  if (!force) {
    try {
      const cached = JSON.parse(localStorage.getItem(WEATHER_KEY) || "null");
      if (cached && Date.now() - cached.at < WEATHER_TTL) {
        weatherData = cached.data;
        return;
      }
    } catch (e) {}
  }
  try {
    const res = await fetch(WEATHER_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    weatherData = await res.json();
    localStorage.setItem(WEATHER_KEY, JSON.stringify({ at: Date.now(), data: weatherData }));
  } catch (e) {
    console.error("Weather fetch failed:", e);
    // keep stale cache if any
    try {
      const cached = JSON.parse(localStorage.getItem(WEATHER_KEY) || "null");
      if (cached) weatherData = cached.data;
    } catch {}
  }
}
function weatherCodeToIconId(code) {
  if (code === 0) return "i-sun";
  if (code === 1 || code === 2) return "i-cloud-sun";
  if (code === 3) return "i-cloud";
  if (code >= 45 && code <= 48) return "i-cloud-fog";
  if (code >= 51 && code <= 57) return "i-cloud-drizzle";
  if (code >= 61 && code <= 67) return "i-cloud-rain";
  if (code >= 71 && code <= 77) return "i-cloud-snow";
  if (code >= 80 && code <= 82) return "i-cloud-rain";
  if (code >= 85 && code <= 86) return "i-cloud-snow";
  if (code >= 95) return "i-cloud-lightning";
  return "i-cloud";
}
function weatherCodeToText(code) {
  if (code === 0) return "晴";
  if (code === 1 || code === 2) return "局部多雲";
  if (code === 3) return "陰";
  if (code >= 45 && code <= 48) return "霧";
  if (code >= 51 && code <= 57) return "毛毛雨";
  if (code >= 61 && code <= 67) return "雨";
  if (code >= 71 && code <= 77) return "雪";
  if (code >= 80 && code <= 82) return "陣雨";
  if (code >= 85 && code <= 86) return "陣雪";
  if (code >= 95) return "雷雨";
  return "—";
}
function renderWeather(dateStr) {
  const slot = document.getElementById("weather-slot");
  if (!slot) return;
  if (!weatherData || !weatherData.daily) {
    slot.innerHTML = `<div class="weather-card loading"><div class="w-main"><svg class="icon icon-md w-icon"><use href="#i-cloud"/></svg><span class="w-temp">—</span><span class="w-text">載入中…</span></div></div>`;
    loadWeather().then(() => {
      if (document.getElementById("weather-slot")) renderWeather(dateStr);
    });
    return;
  }
  const [mo, d] = dateStr.split("/");
  const target = `2026-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
  const idx = weatherData.daily.time.indexOf(target);
  if (idx === -1) { slot.innerHTML = ""; return; }
  const hi = Math.round(weatherData.daily.temperature_2m_max[idx]);
  const lo = Math.round(weatherData.daily.temperature_2m_min[idx]);
  const code = weatherData.daily.weather_code[idx];
  const pop = weatherData.daily.precipitation_probability_max[idx];
  const iconId = weatherCodeToIconId(code);
  const text = weatherCodeToText(code);
  const popHtml = pop != null ? `<span class="w-pop">降雨 ${pop}%</span>` : "";
  const warnTag = pop != null && pop >= 60 ? `<span class="w-warn-tag">記得帶傘</span>` : "";

  // last updated
  let updated = "";
  try {
    const cached = JSON.parse(localStorage.getItem(WEATHER_KEY) || "null");
    if (cached) {
      const mins = Math.round((Date.now() - cached.at) / 60000);
      updated = mins < 1 ? "剛剛更新" : `${mins} 分鐘前更新`;
    }
  } catch {}

  // long-range warning
  const today = new Date();
  const targetDate = new Date(target);
  const daysAhead = Math.round((targetDate - today) / 86400000);
  const longRange = daysAhead > 5
    ? `<div class="w-source warn">遠期預報僅供參考，越接近日期越準</div>`
    : `<div class="w-source">資料：Open-Meteo (ECMWF) — 越接近日期越準</div>`;

  slot.innerHTML = `<div class="weather-card" id="weather-card">
    <div class="w-main">
      <svg class="icon icon-lg w-icon"><use href="#${iconId}"/></svg>
      <span class="w-temp">${lo}° / ${hi}°</span>
      <span class="w-text">${text}</span>
      ${popHtml}
      ${warnTag}
    </div>
    <div class="w-meta">
      <a href="https://www.weather.go.kr/w/weather/forecast/short-term.do" target="_blank" rel="noopener">KMA</a>
      <a href="https://m.weather.naver.com" target="_blank" rel="noopener">NAVER</a>
      <span class="w-updated">${updated}</span>
    </div>
    ${longRange}
  </div>`;
  document.getElementById("weather-card").onclick = async (e) => {
    if (e.target.tagName === "A") return;
    const card = document.getElementById("weather-card");
    card.classList.add("loading");
    await loadWeather(true);
    renderWeather(dateStr);
  };
}

/* ==================== PACKING ==================== */
function renderPacking() {
  const main = document.getElementById("view-packing");
  const all = state.packing.flatMap(c => c.items);
  const done = all.filter(i => i.done).length;
  const total = all.length;
  let html = `
    <div class="packing-header">
      <h1>行李清單</h1>
      <span class="progress">${done} / ${total} 完成</span>
    </div>
  `;
  state.packing.forEach(cat => {
    const catDone = cat.items.filter(i => i.done).length;
    const catTotal = cat.items.length;
    const isComplete = catDone === catTotal && catTotal > 0;
    const collapsed = packingCollapsed[cat.id] === true;
    html += `<div class="pack-cat${collapsed ? " collapsed" : ""}" data-cat="${cat.id}">
      <div class="pack-cat-head">
        <span>${escapeHtml(cat.title)}</span>
        <span>
          <span class="pct-progress${isComplete ? " done" : ""}">${catDone}/${catTotal}</span>
          <span class="chev"><svg class="icon icon-sm"><use href="#i-chevron-down"/></svg></span>
        </span>
      </div>
      <ul class="pack-items">
        ${cat.items.map(it => `
          <li class="pack-item${it.done ? " done" : ""}" data-id="${it.id}">
            <button class="pack-cb${it.done ? " checked" : ""}" aria-label="勾選">${it.done ? '<svg class="icon icon-sm"><use href="#i-check"/></svg>' : ""}</button>
            <span class="pack-name">${escapeHtml(it.name)}${it.note ? ` <span class="pack-note">— ${escapeHtml(it.note)}</span>` : ""}</span>
            <button class="pack-delete" data-del="${it.id}" aria-label="刪除"><svg class="icon icon-sm"><use href="#i-trash-2"/></svg></button>
          </li>
        `).join("")}
      </ul>
      <div class="pack-add">
        <input type="text" placeholder="新增物品…" data-add-input="${cat.id}">
        <button data-add-btn="${cat.id}"><svg class="icon icon-sm"><use href="#i-plus"/></svg></button>
      </div>
    </div>`;
  });
  main.innerHTML = html;

  // Wire up
  main.querySelectorAll(".pack-cat-head").forEach(head => {
    head.onclick = () => {
      const cat = head.parentElement;
      const catId = cat.dataset.cat;
      cat.classList.toggle("collapsed");
      packingCollapsed[catId] = cat.classList.contains("collapsed");
      localStorage.setItem("seoul2026-pkcollapse", JSON.stringify(packingCollapsed));
    };
  });
  main.querySelectorAll(".pack-cb").forEach(cb => {
    cb.onclick = (e) => {
      e.stopPropagation();
      const li = cb.closest(".pack-item");
      const itemId = li.dataset.id;
      const cat = state.packing.find(c => c.items.find(i => i.id === itemId));
      const item = cat.items.find(i => i.id === itemId);
      item.done = !item.done;
      saveLocal();
      renderPacking();
    };
  });
  main.querySelectorAll("[data-del]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const itemId = btn.dataset.del;
      const cat = state.packing.find(c => c.items.find(i => i.id === itemId));
      const target = cat.items.find(i => i.id === itemId);
      if (!confirm(`確定刪除「${target ? target.name : "這個項目"}」？`)) return;
      cat.items = cat.items.filter(i => i.id !== itemId);
      saveLocal();
      renderPacking();
    };
  });
  main.querySelectorAll("[data-add-btn]").forEach(btn => {
    btn.onclick = () => {
      const catId = btn.dataset.addBtn;
      const input = main.querySelector(`[data-add-input="${catId}"]`);
      const name = input.value.trim();
      if (!name) return;
      const cat = state.packing.find(c => c.id === catId);
      cat.items.push({ id: "pu" + Date.now(), name, _custom: true });
      saveLocal();
      renderPacking();
    };
  });
  main.querySelectorAll("[data-add-input]").forEach(input => {
    input.onkeydown = (e) => {
      if (e.key === "Enter") {
        const btn = main.querySelector(`[data-add-btn="${input.dataset.addInput}"]`);
        btn.click();
      }
    };
  });
}

/* ==================== MAP ==================== */
function renderMap() {
  const main = document.getElementById("view-map");
  if (!main.querySelector("#leaflet-map")) {
    let chips = `<button class="map-day-chip all${mapDayFilter === "all" ? " active" : ""}" data-day="all">全部</button>`;
    chips += state.days.map((d, i) =>
      `<button class="map-day-chip${mapDayFilter === d.id ? " active" : ""}" data-day="${d.id}">${d.date}</button>`
    ).join("");
    const legend = `<span>點上方日期可聚焦 · 共 ${state.days.length} 天 · ${Object.keys(ITEM_REGIONS).length} 個地點</span>`;
    main.innerHTML = `
      <div class="map-controls">${chips}</div>
      <div id="leaflet-map"></div>
      <div class="map-legend">${legend}</div>
    `;
    main.querySelectorAll(".map-day-chip").forEach(chip => {
      chip.onclick = () => {
        mapDayFilter = chip.dataset.day;
        renderMap();
      };
    });
  } else {
    // refresh just chips
    main.querySelectorAll(".map-day-chip").forEach(chip => {
      chip.classList.toggle("active", chip.dataset.day === mapDayFilter);
    });
  }

  if (typeof L === "undefined") {
    document.getElementById("leaflet-map").innerHTML = '<div style="padding:20px;text-align:center;color:#6b6b6b">地圖元件載入中…</div>';
    setTimeout(renderMap, 600);
    return;
  }

  // Init map once
  if (!leafletMap) {
    leafletMap = L.map("leaflet-map", {
      zoomControl: true,
      attributionControl: true
    }).setView([37.5665, 126.978], 12);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(leafletMap);
    // hotel always shown
    const h = REGIONS.hotel;
    L.marker([h.lat, h.lng], { title: "🏨 DM Hotel" })
      .bindPopup("<b>🏨 DM Hotel</b><br>東廟站旁")
      .addTo(leafletMap);
  } else {
    // ensure size correct (in case container was hidden)
    setTimeout(() => leafletMap.invalidateSize(), 50);
  }

  // Clear old markers
  mapMarkers.forEach(m => leafletMap.removeLayer(m));
  mapMarkers = [];

  // Add markers per filter
  const regionCounters = {};
  state.days.forEach((day, dayIdx) => {
    if (mapDayFilter !== "all" && mapDayFilter !== day.id) return;
    // 顏色策略：
    //  - all-mode：全 ink 黑
    //  - single-day：當日 accent 綠
    const fillColor = (mapDayFilter === "all") ? "#1A1A1A" : "#79E5CB";
    const strokeColor = "#FFFFFF";

    (state.items[day.id] || []).forEach(item => {
      if (item.hidden) return;
      const regionKey = ITEM_REGIONS[item.id];
      if (!regionKey) return;
      const r = REGIONS[regionKey];
      regionCounters[regionKey] = (regionCounters[regionKey] || 0) + 1;
      const n = regionCounters[regionKey] - 1;
      const offset = 0.0008;
      const lat = r.lat + Math.cos(n * 1.3) * offset * (1 + n * 0.3);
      const lng = r.lng + Math.sin(n * 1.3) * offset * (1 + n * 0.3);
      const marker = L.circleMarker([lat, lng], {
        radius: 8, color: strokeColor, weight: 2,
        fillColor, fillOpacity: 0.95
      }).addTo(leafletMap);
      const naverUrl = naverLink(item.search);
      marker.bindPopup(`
        <b><span class="pop-time">${escapeHtml(item.time || "")}</span>${escapeHtml(item.name)}</b>
        <div class="pop-day">${day.date} ${day.weekday} · ${r.name}</div>
        ${naverUrl ? `<a href="${naverUrl}" target="_blank">Naver 地圖</a>` : ""}
      `);
      mapMarkers.push(marker);
    });
  });

  // Fit bounds to visible markers if filtered to single day
  if (mapDayFilter !== "all" && mapMarkers.length) {
    const group = L.featureGroup(mapMarkers);
    leafletMap.fitBounds(group.getBounds().pad(0.3));
  } else if (mapDayFilter === "all") {
    leafletMap.setView([37.5665, 126.978], 12);
  }
}

/* ==================== MISC ==================== */
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}

/* ==================== EVENT BINDINGS ==================== */
document.getElementById("settings-btn").onclick = openSettings;
document.getElementById("search-toggle").onclick = () => {
  const box = document.getElementById("search-box");
  box.classList.toggle("show");
  if (box.classList.contains("show")) {
    setTimeout(() => document.getElementById("search-input").focus(), 100);
  } else {
    searchTerm = "";
    document.getElementById("search-input").value = "";
    render();
  }
};
document.getElementById("search-input").addEventListener("input", (e) => {
  searchTerm = e.target.value.trim();
  if (!searchTerm) { render(); return; }
  // search across all days, jump to first hit
  for (const day of state.days) {
    const items = state.items[day.id] || [];
    const hit = items.find(i =>
      (i.name && i.name.toLowerCase().includes(searchTerm.toLowerCase())) ||
      (i.transport && i.transport.toLowerCase().includes(searchTerm.toLowerCase())) ||
      (i.note && i.note.toLowerCase().includes(searchTerm.toLowerCase()))
    );
    if (hit) {
      currentDayId = day.id;
      if (currentView !== "itinerary") {
        currentView = "itinerary";
        localStorage.setItem(VIEW_KEY, "itinerary");
      }
      render();
      setTimeout(() => {
        const el = document.querySelector(`[data-id="${hit.id}"]`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 100);
      return;
    }
  }
});
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") closeModal();
});

document.querySelectorAll(".bottom-nav button").forEach(btn => {
  btn.onclick = () => switchView(btn.dataset.view);
});

/* ==================== INIT ==================== */
if (getToken() && getGistId()) setSyncStatus("READY", "ok");
render();
// kick off weather fetch (non-blocking; renderWeather handles re-render)
loadWeather().then(() => {
  if (currentView === "itinerary") {
    const day = state.days.find(d => d.id === currentDayId);
    if (day) renderWeather(day.date);
  }
});

/* Pull on first load if creds set */
if (getToken() && getGistId() && !localStorage.getItem(STORAGE_KEY)) {
  pullFromGist();
}
</script>
